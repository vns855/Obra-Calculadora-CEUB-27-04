<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
<h:head>
    <title>Calculadora de Materiais — Obra Residencial</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .topo {
            background-color: #B22222;
            color: white;
            padding: 18px 30px;
        }
        .topo h1 {
            margin: 0;
            font-size: 22px;
        }
        .topo nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-size: 14px;
        }
        .topo nav a:hover {
            text-decoration: underline;
        }
        .conteudo {
            max-width: 700px;
            margin: 30px auto;
            background: white;
            padding: 25px 35px;
            border-radius: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
        }
        .campo {
            margin-bottom: 14px;
        }
        .campo label {
            display: block;
            margin-bottom: 4px;
            font-weight: bold;
            font-size: 13px;
            color: #333;
        }
        .campo input[type="text"] {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .botao {
            background-color: #B22222;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .botao:hover {
            background-color: #8e1b1b;
        }
        .botao.secundario {
            background-color: #777;
        }
        .resultado {
            margin-top: 20px;
            padding: 18px;
            background-color: #fff7f0;
            border: 1px solid #e8c8a0;
            border-radius: 6px;
        }
        .resultado h3 {
            margin-top: 0;
            color: #B22222;
        }
        table.dados {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        table.dados td {
            padding: 6px 4px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        table.dados td.label {
            color: #555;
        }
        table.dados td.valor {
            text-align: right;
            font-weight: bold;
        }
        .mensagens .ui-message-error, .mensagens span.erro {
            color: #B22222;
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .mensagens span.info {
            color: #2e7d32;
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
        }
    </style>
</h:head>
<h:body>
    <div class="topo">
        <h1>🏗 Calculadora de Materiais — Obra Residencial</h1>
        <nav>
            <h:link outcome="orcamento" value="Novo Orçamento" />
            <h:link outcome="busca" value="Buscar Orçamento" />
        </nav>
    </div>

    <div class="conteudo">
        <ui:insert name="conteudo">Conteúdo da página</ui:insert>
    </div>
</h:body>
</html>
